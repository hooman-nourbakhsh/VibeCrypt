name: CoreLock Auto-Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release Version Number (e.g., v1.0.0)"
        required: true
        default: "v1.0.0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography argon2-cffi customtkinter zxcvbn pyinstaller

      - name: 🏗️ Build CoreLock Executable
        run: pyinstaller --noconfirm --onefile --windowed --name "CoreLock-${{ runner.os }}" main.py

      - name: 📦 Zip macOS App Bundle (Mac Only)
        if: runner.os == 'macOS'
        working-directory: ./dist
        run: zip -r CoreLock-macOS.zip "CoreLock-macOS.app"

      - name: 🚀 Publish directly to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: CoreLock ${{ github.event.inputs.version }}
          files: |
            dist/CoreLock-Windows.exe
            dist/CoreLock-Linux
            dist/CoreLock-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
